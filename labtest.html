<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avijit Pharma | Premium Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fffaf9;
            color: #1a1a1a;
        }

        .primary-orange { color: #ff5f1f; }
        .bg-primary-orange { background-color: #ff5f1f; }
        .border-primary-orange { border-color: #ff5f1f; }
        .hover-bg-orange:hover { background-color: #e54e15; }

        .test-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f1f1;
        }

        .test-card:hover {
            border-color: #ff5f1f;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(255, 95, 31, 0.15);
        }

        .add-btn {
            border: 1.5px solid #ff5f1f;
            color: #ff5f1f;
            transition: all 0.2s;
        }

        .add-btn.added {
            background-color: #ff5f1f;
            color: white;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-enter {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .step-active {
            background-color: #ff5f1f;
            color: white;
            box-shadow: 0 0 0 4px rgba(255, 95, 31, 0.1);
        }

        .sticky-bottom-bar {
            box-shadow: 0 -10px 25px rgba(255, 95, 31, 0.1);
        }
    </style>
</head>
<body class="bg-[#fffaf9] pb-24 lg:pb-0">

    <!-- Premium Navigation -->
    <nav class="bg-white sticky top-0 z-50 border-b border-orange-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between gap-8">
            <!-- Brand -->
            <div class="flex items-center gap-3 shrink-0 cursor-pointer" onclick="window.location.reload()">
                <div class="bg-primary-orange p-2.5 rounded-2xl text-white shadow-lg shadow-orange-200">
                    <i data-lucide="microscope" class="w-6 h-6"></i>
                </div>
                <div class="leading-none">
                    <span class="text-2xl font-extrabold text-slate-900 tracking-tight">AVIJIT<span class="primary-orange">PHARMA</span></span>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Diagnostic Excellence</p>
                </div>
            </div>

            <!-- Global Search -->
            <div class="hidden md:flex flex-1 max-w-xl relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input 
                    type="text" 
                    id="globalSearch"
                    placeholder="Search for blood tests, radiology, or packages..."
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-4 focus:ring-orange-500/10 focus:bg-white focus:border-orange-500 transition-all outline-none"
                >
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end mr-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Premium Support</span>
                    <span class="text-sm font-bold text-slate-700">Online 24/7</span>
                </div>
                <div class="p-3 bg-orange-50 rounded-2xl">
                    <i data-lucide="shield-check" class="w-6 h-6 primary-orange"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 md:py-12">
        
        <!-- Mobile Search -->
        <div class="md:hidden mb-8">
            <div class="relative">
                <input type="text" id="mobileSearch" placeholder="Search 100+ tests..." class="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 shadow-sm outline-none focus:border-orange-500">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- Left Side: Selection Interface -->
            <div id="selectionView" class="lg:col-span-8 transition-opacity duration-300">
                <div class="mb-10">
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Book a Lab Test</h2>
                    <p class="text-slate-500">Professional healthcare diagnostics tailored for your well-being.</p>
                </div>

                <!-- Category Pills -->
                <div class="flex items-center gap-3 overflow-x-auto hide-scrollbar pb-6 mb-8" id="categoryContainer">
                    <!-- Categories -->
                </div>

                <!-- Test Grid -->
                <div>
                    <h3 id="viewTitle" class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 px-1">Available Services</h3>
                    <div id="testGrid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <!-- Tests -->
                    </div>
                </div>
            </div>

            <!-- Right Side: Proceed/Checkout Sidebar -->
            <div class="lg:col-span-4">
                <div id="cartSummary" class="bg-white border border-slate-100 rounded-[32px] p-8 sticky top-28 shadow-xl shadow-orange-900/5 overflow-hidden">
                    
                    <!-- Progress Stepper -->
                    <div class="flex items-center justify-between mb-10 px-2">
                        <div class="flex flex-col items-center gap-2">
                            <div id="stepIcon1" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold step-active transition-all">1</div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Select</span>
                        </div>
                        <div class="flex-1 h-[2px] bg-slate-100 mx-4 mb-6"></div>
                        <div class="flex flex-col items-center gap-2">
                            <div id="stepIcon2" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-slate-100 text-slate-400 transition-all">2</div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Details</span>
                        </div>
                    </div>

                    <!-- Test Selection Summary (Always visible) -->
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-extrabold text-slate-900">Your Basket</h3>
                        <span id="itemLabel" class="text-[10px] font-bold bg-orange-100 primary-orange px-2.5 py-1 rounded-lg uppercase">0 Tests</span>
                    </div>

                    <div id="selectedList" class="space-y-3 mb-8 max-h-[240px] overflow-y-auto no-scrollbar transition-all duration-300">
                        <div class="text-center py-6 opacity-40">
                            <i data-lucide="layers" class="w-8 h-8 mx-auto mb-2"></i>
                            <p class="text-xs">Selection is empty</p>
                        </div>
                    </div>

                    <!-- Step 1: Proceed Button Area (Desktop Sidebar) -->
                    <div id="proceedArea" class="hidden fade-enter">
                        <div class="pt-6 border-t border-dashed border-slate-100">
                            <button onclick="showBookingForm()" class="w-full bg-primary-orange hover-bg-orange text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-orange-200 transition-all active:scale-95 group">
                                <span>Review & Proceed</span>
                                <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Step 2: Form Area (Initially Hidden) -->
                    <div id="formArea" class="hidden fade-enter">
                        <div class="pt-2 border-t border-dashed border-slate-100 mt-2">
                            <div class="flex items-center justify-between mb-6 pt-4">
                                <h4 class="text-sm font-bold text-slate-800">Patient Details</h4>
                                <button onclick="hideBookingForm()" class="text-[10px] font-bold primary-orange uppercase hover:underline">Edit List</button>
                            </div>
                            
                            <form id="finalForm" class="space-y-4">
                                <div>
                                    <input required type="text" id="pName" placeholder="Patient Full Name" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3.5 text-sm focus:ring-2 focus:ring-orange-500">
                                </div>
                                <div>
                                    <input required type="tel" id="pPhone" placeholder="WhatsApp Number" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3.5 text-sm focus:ring-2 focus:ring-orange-500">
                                </div>
                                <div>
                                    <textarea required id="pAddress" rows="3" placeholder="Full Address & Pincode" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3.5 text-sm focus:ring-2 focus:ring-orange-500"></textarea>
                                </div>

                                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 mt-4 hover:bg-black shadow-xl shadow-slate-200 transition-all">
                                    <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                                    <span>Confirm via WhatsApp</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Sticky Proceed Bar (Appears Instantly on Selection) -->
    <div id="mobileStickyProceed" class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-orange-50 p-4 sticky-bottom-bar z-50 hidden slide-up">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="leading-none">
                <p id="mobileItemCount" class="text-[10px] font-bold primary-orange uppercase tracking-widest">0 Tests Selected</p>
                <p class="text-xs text-slate-400 font-medium">Ready to proceed</p>
            </div>
            <button onclick="showBookingForm()" class="bg-primary-orange hover-bg-orange text-white font-bold py-3.5 px-8 rounded-xl flex items-center gap-2 shadow-lg shadow-orange-100 active:scale-95 transition-all">
                <span>Proceed</span>
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <script>
        const labData = {
            "BLOOD": ["TC, DC, ESR, Hb%", "TC, DC, ESR, MP, Hb%", "RA Factor", "ASO Titer", "CRP", "Blood Group / RH", "VDRL", "Blood Sugar (Fasting / PP)", "Urea", "Creatinine", "Uric Acid", "Lipid Profile", "Cholesterol", "Triglyceride", "HDL", "Bilirubin", "SGPT", "ALK PH", "L.F.T.", "T3", "T4", "TSH", "LH", "FSH", "Prolactin", "ANA", "ds DNA", "TORCH", "TOXO IgG, IgM", "TB IgG, IgM, IgA"],
            "CARDIOLOGY": ["ECG", "T.M.T.", "Echocardiography", "Color Doppler", "Holter Monitor"],
            "SONOGRAPHY": ["USG Abdomen", "KUB & Prostate", "Pelvis & Kidneys", "Neonatal Brain", "TV Sonography", "Testis/Thyroid/Orbit", "Folliculometry"],
            "X-RAY": ["Chest X-Ray", "PNS X-Ray", "Lumbar Spine", "Dorsal Spine", "Cervical Spine", "IVP", "HSG"],
            "PATHOLOGY": ["Histo Pathology", "FNAC", "PAP Smear", "Bone Marrow"],
            "OTHER": ["ENDOSCOPY", "COLONOSCOPY", "SPIROMETRY", "Drug Allergy"]
        };

        let selectedTests = new Set();
        let activeCategory = "BLOOD";
        const ADMIN_WA = "919836232423";

        function init() {
            lucide.createIcons();
            renderCategories();
            renderTests(activeCategory);
            setupSearch();
            setupForm();
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = Object.keys(labData).map(cat => `
                <button onclick="selectCategory('${cat}')" id="cat-${cat}" class="px-6 py-2.5 rounded-2xl text-[13px] font-bold whitespace-nowrap transition-all ${cat === activeCategory ? 'bg-primary-orange text-white shadow-lg shadow-orange-100' : 'bg-white text-slate-500 border border-slate-100 hover:border-orange-200'}">
                    ${cat}
                </button>
            `).join('');
        }

        function selectCategory(cat) {
            activeCategory = cat;
            renderCategories();
            document.getElementById('viewTitle').innerText = `${cat} Tests`;
            renderTests(cat);
        }

        function renderTests(query, isSearch = false) {
            const grid = document.getElementById('testGrid');
            let list = [];
            
            if (isSearch) {
                for (const cat in labData) {
                    const matches = labData[cat].filter(t => t.toLowerCase().includes(query.toLowerCase()));
                    list = [...list, ...matches];
                }
            } else {
                list = labData[query];
            }

            grid.innerHTML = list.length > 0 ? list.map(test => `
                <div class="test-card bg-white rounded-3xl p-6 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center gap-2 mb-3 text-[10px] font-black text-orange-600 uppercase tracking-widest">
                            <i data-lucide="shield" class="w-3 h-3"></i> Certified Diagnostic
                        </div>
                        <h4 class="text-base font-bold text-slate-800 leading-snug">${test}</h4>
                        <p class="text-xs text-slate-400 mt-2">Home collection available</p>
                    </div>
                    <div class="mt-6 pt-4 border-t border-slate-50 flex items-center justify-between">
                        <span class="text-xs font-bold text-slate-900 tracking-tight tracking-tighter uppercase">NABL Accredited</span>
                        <button onclick="toggleTest('${test.replace(/'/g, "\\'")}')" class="add-btn px-6 py-2 rounded-xl text-[11px] font-bold uppercase tracking-widest ${selectedTests.has(test) ? 'added' : ''}">
                            ${selectedTests.has(test) ? 'Added' : 'Add'}
                        </button>
                    </div>
                </div>
            `).join('') : '<div class="col-span-full py-20 text-center text-slate-400 font-medium">No results found.</div>';
            
            lucide.createIcons();
        }

        function setupSearch() {
            const handle = (e) => {
                const val = e.target.value;
                if (val.length > 1) {
                    document.getElementById('viewTitle').innerText = `Results for "${val}"`;
                    renderTests(val, true);
                } else if (val.length === 0) {
                    selectCategory(activeCategory);
                }
            };
            document.getElementById('globalSearch').addEventListener('input', handle);
            document.getElementById('mobileSearch').addEventListener('input', handle);
        }

        window.toggleTest = (test) => {
            if (selectedTests.has(test)) selectedTests.delete(test);
            else selectedTests.add(test);
            updateUI();
            
            if (document.getElementById('formArea').classList.contains('hidden')) {
                const searchVal = document.getElementById('globalSearch').value;
                if (searchVal.length > 1) renderTests(searchVal, true);
                else renderTests(activeCategory);
            }
        };

        function updateUI() {
            const count = selectedTests.size;
            const list = document.getElementById('selectedList');
            const proceedArea = document.getElementById('proceedArea');
            const mobileSticky = document.getElementById('mobileStickyProceed');
            const itemLabel = document.getElementById('itemLabel');
            const mobileCount = document.getElementById('mobileItemCount');

            itemLabel.innerText = `${count} ${count === 1 ? 'Test' : 'Tests'}`;
            mobileCount.innerText = `${count} ${count === 1 ? 'Test' : 'Tests'} Selected`;

            if (count > 0) {
                // Instantly show proceed buttons if form isn't already open
                if (document.getElementById('formArea').classList.contains('hidden')) {
                    proceedArea.classList.remove('hidden');
                    mobileSticky.classList.remove('hidden');
                }

                list.innerHTML = Array.from(selectedTests).map(t => `
                    <div class="flex items-center justify-between bg-orange-50/50 p-4 rounded-2xl border border-orange-100/50">
                        <p class="text-[13px] font-bold text-slate-800 truncate pr-4">${t}</p>
                        <button onclick="toggleTest('${t.replace(/'/g, "\\'")}')" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
                lucide.createIcons();
            } else {
                proceedArea.classList.add('hidden');
                mobileSticky.classList.add('hidden');
                hideBookingForm(); 
                list.innerHTML = `<div class="text-center py-6 opacity-40"><i data-lucide="layers" class="w-8 h-8 mx-auto mb-2"></i><p class="text-xs">Selection is empty</p></div>`;
            }
        }

        window.showBookingForm = () => {
            // Hide all proceed buttons instantly
            document.getElementById('proceedArea').classList.add('hidden');
            document.getElementById('mobileStickyProceed').classList.add('hidden');
            
            // Layout changes
            document.getElementById('selectionView').classList.add('opacity-40');
            document.getElementById('selectionView').style.pointerEvents = 'none';
            document.getElementById('formArea').classList.remove('hidden');
            
            // Stepper update
            document.getElementById('stepIcon2').classList.add('step-active');
            document.getElementById('stepIcon2').classList.remove('bg-slate-100', 'text-slate-400');
            
            // Ensure visibility
            document.getElementById('cartSummary').scrollIntoView({ behavior: 'smooth' });
        };

        window.hideBookingForm = () => {
            document.getElementById('formArea').classList.add('hidden');
            if (selectedTests.size > 0) {
                document.getElementById('proceedArea').classList.remove('hidden');
                document.getElementById('mobileStickyProceed').classList.remove('hidden');
            }
            document.getElementById('selectionView').classList.remove('opacity-40');
            document.getElementById('selectionView').style.pointerEvents = 'auto';
            document.getElementById('stepIcon2').classList.remove('step-active');
            document.getElementById('stepIcon2').classList.add('bg-slate-100', 'text-slate-400');
        };

        function setupForm() {
            document.getElementById('finalForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('pName').value;
                const phone = document.getElementById('pPhone').value;
                const addr = document.getElementById('pAddress').value;

                const msg = `*AVIJIT PHARMA DIAGNOSTICS*%0A` +
                    `*Premium Lab Appointment*%0A%0A` +
                    `👤 *Patient:* ${name}%0A` +
                    `📞 *Phone:* ${phone}%0A` +
                    `📍 *Address:* ${addr}%0A%0A` +
                    `🧪 *Selected Tests:*%0A` +
                    Array.from(selectedTests).map((t, i) => `${i+1}. ${t}`).join('%0A') +
                    `%0A%0A_Booking confirmed online_`;

                window.open(`https://wa.me/${ADMIN_WA}?text=${msg}`, '_blank');
            });
        }

        window.onload = init;
    </script>
</body>
</html>
